name: Remove Comments and Copyrights

on:
  workflow_dispatch:

jobs:
  remove-comments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Remove Java/Copyright Comments (Safe Version)
        run: |
          # Remove multi-line /* ... */ comments that contain Copyright
          find app/src/main/java -name "*.java" -exec sed -i '/^[[:space:]]*\/\*.*Copyright/,/\*\//d' {} \;
          
          # Remove standalone // comments (but NOT // inside string literals)
          # This regex looks for // not followed by a quote and not inside a string
          find app/src/main/java -name "*.java" -exec sed -i 's|//[^"].*$||g' {} \;
          
          # Remove empty comment lines and extra blank lines
          find app/src/main/java -name "*.java" -exec sed -i '/^[[:space:]]*$/d' {} \;
          
      - name: Fix any broken string literals (repair market://)
        run: |
          # Repair any damaged market:// URLs
          find app/src/main/java -name "*.java" -exec sed -i 's|"market:$|"market://details?id="|g' {} \;
          find app/src/main/java -name "*.java" -exec sed -i 's|"market:details|"market://details|g' {} \;
          
      - name: Remove XML Comments Only
        run: |
          # Safer XML comment removal - only standalone comment lines
          find app/src/main/res -name "*.xml" -exec sed -i '/^[[:space:]]*<!--.*-->/d' {} \;
          find app/src/main/res -name "*.xml" -exec sed -i '/^[[:space:]]*<!--/,/-->/d' {} \;
          
      - name: Remove EditorConfig Comments
        run: |
          sed -i '/^[[:space:]]*#/d' .editorconfig
          
      - name: Verify Java files still compile (syntax check)
        run: |
          # Check for common broken patterns
          if grep -r '":' app/src/main/java --include="*.java" | grep -v '//' | grep -q '://'; then
            echo "Found potential broken URLs, repairing..."
            find app/src/main/java -name "*.java" -exec sed -i 's|":|"://|g' {} \;
          fi
          
      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "Remove comments and copyright headers" || echo "No changes to commit"
          git push || echo "No changes to push"
