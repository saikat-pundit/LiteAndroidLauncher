name: Android CI/CD

on:
  workflow_dispatch: # Manual trigger
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      # Internal artifact for the next job
      - name: Upload APK for Release
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK from Build Job
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: release-binaries # Downloads into this folder

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          # This uploads the raw .apk file, not a zip
          files: release-binaries/*.apk
          generate_release_notes: true
          body: "Official release for version ${{ github.ref_name }}. Source code is attached below."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
