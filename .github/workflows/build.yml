name: Android CI/CD

on:
  workflow_dispatch: # Manual trigger
 
# Grant the workflow permission to create/update releases
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # IMPORTANT: Kept Java 8 for your specific legacy project compatibility
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Build the Release APK (bypassing lint errors as configured in your build.gradle)
      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          # Find the generated release APK file
          APK_FILE=$(find app/build/outputs -name "*.apk" | head -n 1)
          # Rename and move it to the root for easier access
          mv "$APK_FILE" HayaiLauncher-Release.apk

      # Upload the APK to the Releases page (Rolling "latest" release)
      - name: Upload to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "HayaiLauncher-Release.apk"
          tag: "latest"
          name: "Latest Build"
          body: "Automated release build of Hayai Launcher."
          allowUpdates: true        # Updates the existing 'latest' release instead of failing
          replacesArtifacts: true   # Deletes the old APK and uploads the new one
          token: ${{ secrets.GITHUB_TOKEN }}
