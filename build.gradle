buildscript {
    repositories {
        google()
        jcenter()
    }
    dependencies {
        // Updated from 2.2.3 to 3.4.2 for better compatibility
        classpath 'com.android.tools.build:gradle:3.4.2'
    }
}

allprojects {
    repositories {
        google()
        jcenter()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
